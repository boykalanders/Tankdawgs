<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" fill="none">
  <defs>
    <linearGradient id="lgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3dc86"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#8a6d1d"/>
    </linearGradient>
    <radialGradient id="lsteel" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#3a4a58"/>
      <stop offset="60%" stop-color="#222c36"/>
      <stop offset="100%" stop-color="#0e1318"/>
    </radialGradient>
  </defs>

  <!-- Emblem: a tank inside a gold ring -->
  <circle cx="100" cy="100" r="88" fill="url(#lsteel)" stroke="url(#lgold)" stroke-width="6"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#e8c547" stroke-width="1" opacity="0.3"/>
  <g fill="#cdb45a">
    <!-- barrel -->
    <rect x="96" y="74" width="58" height="8" rx="3" transform="rotate(-22 96 78)"/>
    <!-- turret -->
    <path d="M78 92 h36 a6 6 0 0 1 6 6 v2 h-48 v-2 a6 6 0 0 1 6 -6 z"/>
    <!-- hull -->
    <rect x="58" y="104" width="84" height="16" rx="5"/>
    <!-- tracks -->
    <rect x="54" y="120" width="92" height="14" rx="7" fill="#1c252e"/>
    <circle cx="66" cy="127" r="4.5" fill="#cdb45a"/>
    <circle cx="84" cy="127" r="4.5" fill="#cdb45a"/>
    <circle cx="102" cy="127" r="4.5" fill="#cdb45a"/>
    <circle cx="120" cy="127" r="4.5" fill="#cdb45a"/>
    <circle cx="134" cy="127" r="4.5" fill="#cdb45a"/>
  </g>

  <!-- Wordmark -->
  <text x="214" y="94" font-family="Cinzel, Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" letter-spacing="3" fill="url(#lgold)">TANK</text>
  <text x="216" y="144" font-family="Cinzel, Georgia, serif" font-size="40" font-weight="600" letter-spacing="20" fill="#f5ecd6">DAWGS</text>
</svg>
